# List of datasets
# Add new datasets by copying the template below and filling in the details
#
# Fields:
#   - name: Dataset name (required)
#   - description: Brief description of the dataset (required)
#   - category: e.g., Finance, Economics, Machine Learning, NLP, etc. (required)
#   - type: Academic or Non-Academic (required)
#   - source: Provider/Institution name (required)
#   - url: Link to the dataset (required)
#   - size: Approximate size or number of records (optional)
#   - format: Data format (CSV, JSON, API, etc.) (optional)
#   - license: License type (optional)
#   - notes: Additional notes (optional)

# Finance & Economics
- name: "Yahoo Finance"
  description: "Historical and real-time stock prices, financial statements, and market data."
  category: "Finance"
  type: "Non-Academic"
  source: "Yahoo"
  url: "https://finance.yahoo.com/"
  size: "Extensive"
  format: "API, CSV"
  license: "Free for personal use"
  notes: "Accessible via yfinance Python library"

- name: "FRED Economic Data"
  description: "Over 800,000 economic time series from various sources including GDP, employment, inflation."
  category: "Economics"
  type: "Academic"
  source: "Federal Reserve Bank of St. Louis"
  url: "https://fred.stlouisfed.org/"
  size: "800,000+ series"
  format: "API, CSV, Excel"
  license: "Public Domain"
  notes: "Excellent for macroeconomic research"

- name: "Quandl"
  description: "Financial, economic, and alternative data covering stocks, futures, options, and more."
  category: "Finance"
  type: "Non-Academic"
  source: "Nasdaq"
  url: "https://data.nasdaq.com/"
  size: "Extensive"
  format: "API, CSV"
  license: "Varies by dataset"
  notes: "Now part of Nasdaq Data Link"

- name: "Kenneth French Data Library"
  description: "Fama-French factors, portfolios, and returns data for asset pricing research."
  category: "Finance"
  type: "Academic"
  source: "Dartmouth College"
  url: "https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/data_library.html"
  size: "Multiple datasets"
  format: "CSV, TXT"
  license: "Academic use"
  notes: "Standard for academic finance research"

- name: "CRSP"
  description: "Comprehensive historical stock data for US equities."
  category: "Finance"
  type: "Academic"
  source: "University of Chicago"
  url: "https://www.crsp.org/"
  size: "Extensive"
  format: "Various"
  license: "Subscription required"
  notes: "Gold standard for US equity research"

- name: "Compustat"
  description: "Fundamental financial data for public companies worldwide."
  category: "Finance"
  type: "Academic"
  source: "S&P Global"
  url: "https://www.spglobal.com/marketintelligence/"
  size: "40,000+ companies"
  format: "Various"
  license: "Subscription required"
  notes: "Often accessed through WRDS"

